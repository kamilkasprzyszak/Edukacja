<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Księgowy Trener - Zaawansowany Generator Bilansów</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a; --card-bg: rgba(30, 41, 59, 0.7); --card-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc; --text-muted: #94a3b8;
            --accent-assets: #38bdf8; --accent-liab: #f472b6;
            --success: #34d399; --error: #f87171; --warning: #fbbf24;
            --hover-bg: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg); color: var(--text-main); min-height: 100vh; padding: 1.5rem 2rem;
            background-image: radial-gradient(circle at 15% 50%, rgba(56, 189, 248, 0.05) 0%, transparent 50%),
                              radial-gradient(circle at 85% 30%, rgba(244, 114, 182, 0.05) 0%, transparent 50%);
        }

        header { text-align: center; margin-bottom: 1.5rem; }
        h1 { font-size: 2.2rem; font-weight: 700; background: linear-gradient(135deg, var(--accent-assets), var(--accent-liab)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.5rem; }
        p.subtitle { color: var(--text-muted); font-size: 1rem; line-height: 1.4; }

        .top-controls { display: flex; justify-content: center; align-items: center; gap: 1rem; margin-top: 1.5rem; flex-wrap: wrap; background: rgba(0,0,0,0.2); padding: 1rem; border-radius: 12px; border: 1px solid var(--card-border); max-width: 1000px; margin-left: auto; margin-right: auto;}

        .container { display: grid; grid-template-columns: 380px 1fr 1fr; gap: 1.5rem; max-width: 1600px; margin: 0 auto; }

        .panel {
            background: var(--card-bg); backdrop-filter: blur(12px); border: 1px solid var(--card-border);
            border-radius: 12px; padding: 1.2rem; display: flex; flex-direction: column; gap: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }

        .panel-header {
            font-size: 1.1rem; font-weight: 700; padding-bottom: 0.8rem; border-bottom: 1px solid var(--card-border);
            display: flex; justify-content: space-between; align-items: center; text-transform: uppercase;
        }

        .unassigned-list, .template-list { overflow-y: auto; max-height: 65vh; padding-right: 0.5rem; display: flex; flex-direction: column; gap: 0.8rem;}
        .unassigned-list::-webkit-scrollbar, .template-list::-webkit-scrollbar { width: 6px; }
        .unassigned-list::-webkit-scrollbar-track, .template-list::-webkit-scrollbar-track { background: transparent; }
        .unassigned-list::-webkit-scrollbar-thumb, .template-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        .item-card { background: rgba(0, 0, 0, 0.3); border: 1px solid var(--card-border); border-radius: 8px; padding: 0.8rem; transition: all 0.2s; }
        .item-card:hover { background: var(--hover-bg); border-color: rgba(255,255,255,0.3); }

        .item-title { font-size: 0.85rem; margin-bottom: 0.6rem; color: #e2e8f0; line-height: 1.4;}
        .item-controls-row { display: flex; justify-content: space-between; align-items: center; }

        .main-cat { border: 1px solid var(--card-border); border-radius: 8px; background: rgba(0, 0, 0, 0.2); overflow: hidden; }
        .main-cat-header { background: rgba(255, 255, 255, 0.08); padding: 0.6rem 0.8rem; font-weight: 700; font-size: 0.95rem; display: flex; justify-content: space-between; color: #f8fafc; border-bottom: 1px solid var(--card-border); }
        .sub-cat { border-bottom: 1px solid rgba(255,255,255,0.05); }
        .sub-cat:last-child { border-bottom: none; }
        .sub-cat-header { padding: 0.4rem 0.8rem 0.4rem 1.5rem; font-weight: 500; font-size: 0.85rem; color: #cbd5e1; display: flex; justify-content: space-between; background: rgba(0, 0, 0, 0.15); }

        .assigned-item {
            display: flex; justify-content: space-between; align-items: center; padding: 0.4rem 0.8rem 0.4rem 2.5rem;
            font-size: 0.8rem; background: rgba(255, 255, 255, 0.02); border-top: 1px dashed rgba(255,255,255,0.08);
            color: #94a3b8; transition: all 0.2s;
        }
        .assigned-item:hover { background: rgba(255, 255, 255, 0.06); color: #e2e8f0; }

        .assigned-name { flex: 1; padding-right: 1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .assigned-controls { display: flex; align-items: center; gap: 0.8rem; }

        .remove-btn { background: transparent; border: none; color: var(--error); cursor: pointer; font-size: 1rem; opacity: 0.6; padding: 0 4px; }
        .remove-btn:hover { opacity: 1; }

        select { background: rgba(15, 23, 42, 0.9); color: var(--text-main); border: 1px solid var(--card-border); padding: 0.5rem; border-radius: 6px; font-size: 0.85rem; outline: none; cursor: pointer; width: 100%; transition: border-color 0.2s; }
        select:focus { border-color: var(--accent-assets); }
        optgroup { font-weight: 700; background: #0f172a; color: #38bdf8; }

        input[type="number"] { background: rgba(15, 23, 42, 0.9); color: #fff; border: 1px solid var(--accent-liab); padding: 0.3rem 0.5rem; border-radius: 4px; font-size: 0.85rem; width: 100px; text-align: right; outline: none; }
        input[type="number"]:focus { border-color: var(--accent-assets); }
        .mini-input { width: 85px; padding: 0.2rem; font-size: 0.8rem; }

        .item-value, .sum-value { font-family: monospace; font-weight: 600; }
        .item-value { background: rgba(255,255,255,0.05); padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.95rem;}

        .sum-row { display: flex; justify-content: space-between; padding: 1rem; background: rgba(0,0,0,0.4); border-radius: 8px; font-weight: 700; margin-top: 1rem; border: 1px solid var(--card-border); font-size: 1.1rem; }
        .sum-assets { color: var(--accent-assets); border-color: rgba(56, 189, 248, 0.3); background: rgba(56, 189, 248, 0.05); }
        .sum-liab { color: var(--accent-liab); border-color: rgba(244, 114, 182, 0.3); background: rgba(244, 114, 182, 0.05); }

        .status-bar { grid-column: 1 / -1; background: var(--card-bg); backdrop-filter: blur(12px); border: 1px solid var(--card-border); border-radius: 12px; padding: 1.2rem; display: flex; justify-content: space-between; align-items: center; margin-top: 0.5rem; }
        .status-info { display: flex; align-items: center; gap: 2rem; font-weight: 600; font-size: 1.1rem;}
        .status-match { color: var(--success); display: flex; align-items: center; gap: 0.5rem; }
        .status-error { color: var(--error); display: flex; align-items: center; gap: 0.5rem; }

        .btn { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid rgba(255,255,255,0.2); padding: 0.6rem 1.2rem; border-radius: 6px; cursor: pointer; transition: all 0.2s; font-weight: 500; font-size: 0.95rem; }
        .btn:hover { background: rgba(255,255,255,0.15); }
        .btn-primary { background: rgba(56, 189, 248, 0.1); color: var(--accent-assets); border-color: rgba(56, 189, 248, 0.3); }
        .btn-primary:hover { background: rgba(56, 189, 248, 0.2); }
        .btn-success { background: rgba(52, 211, 153, 0.1); color: var(--success); border-color: rgba(52, 211, 153, 0.3); }
        .btn-success:hover { background: rgba(52, 211, 153, 0.2); }
        .btn-warning { background: rgba(251, 191, 36, 0.1); color: var(--warning); border-color: rgba(251, 191, 36, 0.3); }
        .btn-warning:hover { background: rgba(251, 191, 36, 0.2); }

        @media (max-width: 1200px) { .container { grid-template-columns: 1fr; } .status-bar { flex-direction: column; gap: 1rem; } }
    </style>
</head>

            { id: 13, name: "Sprzęt medyczny w magazynie", value: 56000, category: "unassigned", correctCategory: "B_I" },
            { id: 14, name: "Kredyt bankowy cz. długoterminowa", value: 176000, category: "unassigned", correctCategory: "PB_II" },
            { id: 15, name: "Kredyt bankowy cz. krótkoterminowa (do 12 mies.)", value: 48000, category: "unassigned", correctCategory: "PB_III" },
            { id: 16, name: "Grunt, na którym znajduje się budynek", value: 120000, category: "unassigned", correctCategory: "A_II" },
            { id: 17, name: "Naliczone i niewypłacone wynagrodzenia", value: 8200, category: "unassigned", correctCategory: "PB_III" },
            { id: 18, name: "Kapitał zapasowy", value: 14000, category: "unassigned", correctCategory: "PA_II" },
            { id: 19, name: "Grunt nabyty w celach inwestycyjnych", value: 20000, category: "unassigned", correctCategory: "A_IV" },
            { id: 20, name: "Akcje spółki „TELEFON S.A.” (długoterminowe)", value: 3600, category: "unassigned", correctCategory: "A_IV" },
            { id: 21, name: "Zespoły komputerowe w dziale projektowym", value: 28000, category: "unassigned", correctCategory: "A_II" },
            { id: 22, name: "Oprogramowanie komputerów", value: 13000, category: "unassigned", correctCategory: "A_I" },
            { id: 23, name: "Naliczone i niezapłacone składki ZUS", value: 1700, category: "unassigned", correctCategory: "PB_III" },
            { id: 24, name: "Zysk netto osiągnięty w bieżącym roku", value: 42500, category: "unassigned", correctCategory: "PA_VI" },
            { id: 25, name: "Pożyczka udzielona spółce (spłata za 6 mies.)", value: 10000, category: "unassigned", correctCategory: "B_III" },
            { id: 26, name: "Zobowiązania z tytułu PIT", value: 1400, category: "unassigned", correctCategory: "PB_III" },
            { id: 27, name: "Zobowiązania z tytułu CIT", value: 4400, category: "unassigned", correctCategory: "PB_III" },
            { id: 28, name: "Weksel obcy (termin 30 dni)", value: 5000, category: "unassigned", correctCategory: "B_III" },
            { id: 29, name: "Weksel własny (termin 6 miesięcy)", value: 4500, category: "unassigned", correctCategory: "PB_III" },
            { id: 30, name: "Kapitał podstawowy", value: 0, category: "unassigned", correctCategory: "PA_I", isMissing: true }
        ];

        let state = [];
        let baseData = JSON.parse(JSON.stringify(medPolData));
        let showErrors = false;

        const formatCurrency = (val) => new Intl.NumberFormat('pl-PL', { style: 'currency', currency: 'PLN', maximumFractionDigits: 0 }).format(val);

        const updateState = (id, field, value) => {
            const item = state.find(i => i.id === id);
            if (item) {
                if (field === 'value') item[field] = Number(value) || 0;
                else item[field] = value;
                showErrors = false;
                render();
            }
        };

        const resetState = () => { 
            state = JSON.parse(JSON.stringify(baseData)); 
            showErrors = false;
            render(); 
        };

        const loadMedPol = () => {
            document.getElementById('task-subtitle').innerHTML = " MED-POL S.A.<br><span style='font-size: 0.9rem; color: var(--accent-assets)'>Oryginalne zadanie edukacyjne</span>";
            baseData = JSON.parse(JSON.stringify(medPolData));
            resetState();
        };

        const generateRandomTask = () => {
            const sectorSelect = document.getElementById('sector-selector').value;
            const sectorsList = ['produkcja', 'handel', 'it', 'rolnictwo'];
            const targetSector = sectorSelect === 'random' ? sectorsList[Math.floor(Math.random() * sectorsList.length)] : sectorSelect;

            const companyName = companyNames[targetSector][Math.floor(Math.random() * companyNames[targetSector].length)];

            const availableAssets = richAssetPool.filter(i => i.sectors.includes("all") || i.sectors.includes(targetSector));
            const availableLiabs = richLiabPool.filter(i => i.sectors.includes("all") || i.sectors.includes(targetSector));

            const numAssets = Math.floor(Math.random() * 6) + 9;  // 9-14 aktywów
            const numLiabs = Math.floor(Math.random() * 5) + 7;   // 7-11 pasywów (poza kap. podst.)

            const shuffledAssets = availableAssets.sort(() => 0.5 - Math.random()).slice(0, numAssets);
            const shuffledLiabs = availableLiabs.sort(() => 0.5 - Math.random()).slice(0, numLiabs);

            let newItems = [];
            let sumAssets = 0, sumLiabs = 0;

            shuffledAssets.forEach(item => {
                const val = (Math.floor(Math.random() * (item.max - item.min + 1)) + item.min) * 1000;
                sumAssets += val;
                newItems.push({ name: item.name, value: val, category: "unassigned", correctCategory: item.cat });
            });

            shuffledLiabs.forEach(item => {
                const val = (Math.floor(Math.random() * (item.max - item.min + 1)) + item.min) * 1000;
                sumLiabs += val;
                newItems.push({ name: item.name, value: val, category: "unassigned", correctCategory: item.cat });
            });

            // Gwarancja że Aktywa > Pasywa aby Kapitał był dodatni (rezerwa ok. 50k - 200k)
            if (sumLiabs >= sumAssets) {
                const diff = sumLiabs - sumAssets;
                const extra = (Math.floor(Math.random() * 150) + 50) * 1000;
                newItems[0].value += (diff + extra);
                sumAssets += (diff + extra);
            }

            newItems.push({ name: "Kapitał podstawowy", value: 0, category: "unassigned", correctCategory: "PA_I", isMissing: true });

            newItems = newItems.sort(() => 0.5 - Math.random());
            newItems.forEach((item, idx) => item.id = idx + 1);

            baseData = JSON.parse(JSON.stringify(newItems));
            
            const sectorDisplayNames = {
                'produkcja': '🏭 Przemysł i Produkcja', 'handel': '🛒 Handel i Dystrybucja', 'it': '💻 Usługi IT', 'rolnictwo': '🌾 Sektor Rolniczy'
            };

            document.getElementById('task-subtitle').innerHTML = `Zadanie Wygenerowane Losowo<br><span style='font-size: 1.1rem; color: #fff;'>Firma: <b>${companyName}</b> (${sectorDisplayNames[targetSector]})</span>`;
            resetState();
        };

        const checkErrors = () => {
            showErrors = true;
            render();
        };

        const generateSelect = (itemId, currentCat) => {
            let html = `<select onchange="updateState(${itemId}, 'category', this.value)">`;
            html += `<option value="unassigned" ${currentCat === 'unassigned' ? 'selected' : ''}>Wybierz folder...</option>`;
            
            html += `<optgroup label="--- AKTYWA ---">`;
            Object.keys(categoriesMap).filter(k => categoriesMap[k].type === 'aktywa').forEach(k => {
                html += `<option value="${k}" ${currentCat === k ? 'selected' : ''}>${categoriesMap[k].dropName}</option>`;
            });
            html += `</optgroup><optgroup label="--- PASYWA ---">`;
            Object.keys(categoriesMap).filter(k => categoriesMap[k].type === 'pasywa').forEach(k => {
                html += `<option value="${k}" ${currentCat === k ? 'selected' : ''}>${categoriesMap[k].dropName}</option>`;
            });
            html += `</optgroup></select>`;
            return html;
        };

        const renderAssignedItem = (item) => {
            const hasError = showErrors && item.category !== 'unassigned' && item.category !== item.correctCategory;
            const errorStyle = hasError ? `border-left: 4px solid var(--error); background: rgba(248, 113, 113, 0.1);` : ``;
            
            const valInput = item.isMissing 
                ? `<input type="number" class="mini-input" value="${item.value || ''}" placeholder="..." onchange="updateState(${item.id}, 'value', this.value)" onkeyup="updateState(${item.id}, 'value', this.value)">`
                : `<span class="sum-value" style="font-size:0.85rem">${formatCurrency(item.value)}</span>`;

            return `
                <div class="assigned-item" style="${errorStyle}">
                    <div class="assigned-name" title="${item.name}"><strong>${item.id}.</strong> ${item.name}</div>
                    <div class="assigned-controls">
                        ${hasError ? `<span style="color:var(--error); font-size: 14px; font-weight: bold;" title="Błędna kategoria!">⚠</span>` : ''}
                        ${valInput}
                        <button class="remove-btn" onclick="updateState(${item.id}, 'category', 'unassigned')" title="Usuń z przypisania">✖</button>
                    </div>
                </div>
            `;
        };

        const renderTree = (treeStructure) => {
            let html = '';
            let totalSum = 0;
            
            treeStructure.forEach(mainCat => {
                let mainCatSum = 0;
                let subsHtml = '';
                
                mainCat.subs.forEach(subId => {
                    const subItems = state.filter(i => i.category === subId);
                    const subSum = subItems.reduce((acc, val) => acc + (val.value || 0), 0);
                    mainCatSum += subSum;
                    
                    if (subId !== mainCat.id) {
                        subsHtml += `
                            <div class="sub-cat">
                                <div class="sub-cat-header">
                                    <span>${categoriesMap[subId].treeName}</span>
                                    <span class="sum-value">${formatCurrency(subSum)}</span>
                                </div>
                                <div class="sub-cat-items">${subItems.map(renderAssignedItem).join('')}</div>
                            </div>
                        `;
                    } else {
                        subsHtml += `<div class="sub-cat-items">${subItems.map(renderAssignedItem).join('')}</div>`;
                    }
                });
                
                totalSum += mainCatSum;
                html += `
                    <div class="main-cat">
                        <div class="main-cat-header">
                            <span>${mainCat.title}</span>
                            <span class="sum-value">${formatCurrency(mainCatSum)}</span>
                        </div>
                        ${subsHtml}
                    </div>
                `;
            });
            return { html, totalSum };
        };

        const calculateMissingValue = () => {
            const missingItem = state.find(i => i.isMissing);
            if (!missingItem) return;

            if (missingItem.category === 'unassigned') {
                alert("Przypisz najpierw 'Kapitał podstawowy' do poprawnej kategorii (A.I. Kapitał podstawowy w Pasywach)!");
                return;
            }

            const tempVal = missingItem.value;
            missingItem.value = 0;
            
            let aktywa = 0, pasywa = 0;
            state.forEach(item => {
                if (item.category !== 'unassigned') {
                    if (categoriesMap[item.category].type === 'aktywa') aktywa += item.value || 0;
                    if (categoriesMap[item.category].type === 'pasywa') pasywa += item.value || 0;
                }
            });
            
            let targetValue = categoriesMap[missingItem.category].type === 'pasywa' ? aktywa - pasywa : pasywa - aktywa;

            if (targetValue > 0) {
                missingItem.value = targetValue;
                render();
            } else {
                missingItem.value = tempVal;
                alert("Suma przeciwnej strony bilansu jest mniejsza. Prawdopodobnie jakiś element został błędnie przypisany!");
            }
        };

        const render = () => {
            const app = document.getElementById('app');
            const unassignedItems = state.filter(i => i.category === 'unassigned');
            
            const aktywaData = renderTree(aktywaTree);
            const pasywaData = renderTree(pasywaTree);
            
            const isBalanced = aktywaData.totalSum > 0 && aktywaData.totalSum === pasywaData.totalSum && unassignedItems.length === 0;

            app.innerHTML = `
                <!-- Kolumna 1: Nieprzypisane -->
                <div class="panel">
                    <div class="panel-header">Do rozpisania
                        <span style="font-size: 0.8rem; background: rgba(0,0,0,0.4); padding: 3px 8px; border-radius: 12px; font-weight: normal; color: var(--text-muted)">
                            Pozostało: ${unassignedItems.length}
                        </span>
                    </div>
                    <div class="unassigned-list">
                        ${unassignedItems.map(item => `
                            <div class="item-card">
                                <div class="item-title"><strong>${item.id}.</strong> ${item.name}</div>
                                <div class="item-controls-row">
                                    ${item.isMissing 
                                        ? `<input type="number" class="mini-input" value="${item.value || ''}" placeholder="...?" onchange="updateState(${item.id}, 'value', this.value)" onkeyup="updateState(${item.id}, 'value', this.value)">`
                                        : `<span class="item-value">${formatCurrency(item.value)}</span>`
                                    }
                                </div>
                                <div style="margin-top: 0.5rem">${generateSelect(item.id, item.category)}</div>
                            </div>
                        `).join('')}
                        ${unassignedItems.length === 0 ? `
                            <div style="text-align: center; color: var(--success); padding: 2rem; background: rgba(52, 211, 153, 0.05); border-radius: 8px; border: 1px dashed var(--success); margin-top: 2rem;">
                                Wszystko pogrupowane! Sprawdź czy bilans się zgadza.
                            </div>
                        ` : ''}
                    </div>
                </div>

                <!-- Kolumna 2: Aktywa -->
                <div class="panel" style="border-top: 4px solid var(--accent-assets)">
                    <div class="panel-header">AKTYWA</div>
                    <div class="template-list">${aktywaData.html}</div>
                    <div style="margin-top: auto;">
                        <div class="sum-row sum-assets">
                            <span>Aktywa razem</span>
                            <span>${formatCurrency(aktywaData.totalSum)}</span>
                        </div>
                    </div>
                </div>

                <!-- Kolumna 3: Pasywa -->
                <div class="panel" style="border-top: 4px solid var(--accent-liab)">
                    <div class="panel-header">PASYWA</div>
                    <div class="template-list">${pasywaData.html}</div>
                    <div style="margin-top: auto;">
                        <div class="sum-row sum-liab">
                            <span>Pasywa razem</span>
                            <span>${formatCurrency(pasywaData.totalSum)}</span>
                        </div>
                    </div>
                </div>

                <!-- Pasek Statusu -->
                <div class="status-bar">
                    <div class="status-info">
                        <div>Równowaga: <span class="${isBalanced ? 'status-match' : 'status-error'}">${isBalanced ? '✔ ZBILANSOWANY' : '✖ NIEZBILANSOWANY'}</span></div>
                        ${!isBalanced && aktywaData.totalSum > 0 && pasywaData.totalSum > 0 ? `
                            <div style="font-size: 1rem; color: var(--text-muted); display: flex; align-items: center; gap: 0.5rem;">
                                Różnica: <b style="color: var(--error);">${formatCurrency(Math.abs(aktywaData.totalSum - pasywaData.totalSum))}</b>
                            </div>
                        ` : ''}
                    </div>
                    
                    <div style="display: flex; gap: 1rem;">
                        <button class="btn btn-success" onclick="calculateMissingValue()">Oblicz brakującą wartość</button>
                        <button class="btn" onclick="resetState()">Wyczyść formularz</button>
                    </div>
                </div>
            `;
        };

        loadMedPol(); // Uruchomienie na starcie
    </script>
</body>
</html>
