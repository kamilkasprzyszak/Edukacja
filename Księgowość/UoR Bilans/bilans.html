<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wyszukiwarka Pozycji Bilansowych - UoR</title>
    <style>
        :root {
            --bg-color: #fdf6e3;
            --container-bg: #ffffff;
            --primary-color: #ff6b6b;
            --accent-color: #4ecdc4;
            --text-color: #2d3436;
            --highlight: #ffeaa7;
            --select-bg: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            background-color: var(--container-bg);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            max-width: 900px;
            width: 100%;
            border-top: 8px solid var(--accent-color);
        }

        h1 {
            color: var(--primary-color);
            text-align: center;
            margin-bottom: 5px;
        }

        p.subtitle {
            text-align: center;
            color: #636e72;
            margin-bottom: 20px;
            font-size: 0.9em;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        select.form-select {
            flex: 1;
            min-width: 250px;
            padding: 15px;
            font-size: 15px;
            border: 2px solid #dfe6e9;
            border-radius: 8px;
            background-color: var(--select-bg);
            color: var(--text-color);
            font-weight: 600;
            outline: none;
            cursor: pointer;
            transition: border-color 0.3s;
        }

        select.form-select:focus {
            border-color: var(--accent-color);
        }

        .search-box {
            flex: 2;
            min-width: 300px;
            padding: 15px;
            font-size: 15px;
            border: 2px solid var(--accent-color);
            border-radius: 8px;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .search-box:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 8px rgba(255, 107, 107, 0.3);
        }

        .bilans-tree {
            list-style-type: none;
            padding-left: 10px;
        }

        .bilans-tree ul {
            list-style-type: none;
            padding-left: 25px;
            border-left: 2px dashed #dfe6e9;
            margin-top: 5px;
        }

        .bilans-tree li {
            margin: 8px 0;
            line-height: 1.5;
        }

        .item-label {
            padding: 4px 8px;
            border-radius: 4px;
            transition: background-color 0.2s;
            display: inline-block;
        }

        .hidden {
            display: none !important;
        }

        .highlight {
            background-color: var(--highlight);
            font-weight: bold;
            color: var(--primary-color);
            border-radius: 4px;
        }

        /* Hierarchia wizualna */
        .level-0 > .item-label { font-weight: 800; font-size: 1.3em; color: #2d3436; text-transform: uppercase; margin-top: 15px; }
        .level-1 > .item-label { font-weight: 700; color: var(--primary-color); font-size: 1.1em; }
        .level-2 > .item-label { font-weight: 600; color: #0984e3; }
        .level-3 > .item-label { color: #2d3436; font-weight: 500; }
        .level-4 > .item-label { color: #636e72; font-size: 0.95em; }

        .no-results {
            text-align: center;
            color: #d63031;
            font-weight: bold;
            padding: 20px;
            display: none;
        }
    </style>
</head>

    </div>

    const rootElement = document.getElementById('bilansRoot');

    // Budowanie HTML na podstawie JSON
    function buildTree(data, parentElement, level) {
        data.forEach(item => {
            let li = document.createElement('li');
            li.className = `level-${level}`;
            
            let span = document.createElement('span');
            span.className = 'item-label';
            span.textContent = item.name;
            li.appendChild(span);

            if (item.children && item.children.length > 0) {
                let ul = document.createElement('ul');
                buildTree(item.children, ul, level + 1);
                li.appendChild(ul);
            }
            parentElement.appendChild(li);
        });
    }

    // Obsługa zmiany załącznika w dropdownie
    function changeZalacznik() {
        const selected = document.getElementById('zalacznikSelect').value;
        rootElement.innerHTML = ''; // Wyczyść obecne drzewo
        buildTree(db[selected], rootElement, 0); // Zbuduj nowe
        
        // Zresetuj wyszukiwarkę
        document.getElementById('searchInput').value = '';
        filterTree();
    }

    // Inicjalizacja startowa (Załącznik 4 ustawiony jako domyślny w HTML)
    changeZalacznik();

    // Silnik wyszukiwania
    function filterTree() {
        let input = document.getElementById('searchInput').value.toLowerCase();
        let items = document.querySelectorAll('.bilans-tree li');
        let noResultsMsg = document.getElementById('noResults');
        let hasMatches = false;

        // Reset przy pustym polu
        if (input.length === 0) {
            items.forEach(li => {
                li.classList.remove('hidden');
                li.querySelector('.item-label').classList.remove('highlight');
            });
            noResultsMsg.style.display = 'none';
            return;
        }

        // Ukryj wszystko i zdejmij highlight
        items.forEach(li => {
            li.classList.add('hidden');
            li.querySelector('.item-label').classList.remove('highlight');
        });

        // Szukaj dopasowań
        items.forEach(li => {
            let label = li.querySelector('.item-label');
            let text = label.textContent.toLowerCase();
            
            if (text.includes(input)) {
                hasMatches = true;
                label.classList.add('highlight');
                li.classList.remove('hidden');
                
                // Odkryj wszystkich "rodziców" aż do korzenia
                let parent = li.parentElement;
                while (parent && parent.tagName === 'UL' && parent.id !== 'bilansRoot') {
                    parent.parentElement.classList.remove('hidden');
                    parent = parent.parentElement.parentElement;
                }
                
                // Odkryj wszystkie "dzieci" podświetlonego elementu
                let children = li.querySelectorAll('li');
                children.forEach(child => child.classList.remove('hidden'));
            }
        });

        // Wyświetlanie komunikatu o braku wyników
        noResultsMsg.style.display = hasMatches ? 'none' : 'block';
    }
