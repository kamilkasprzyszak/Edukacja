        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            max-width: 850px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 5px;
        }
        p.subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 30px;
            font-size: 0.95em;
        }
        .search-container {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }
        input[type="text"] {
            width: 100%;
            max-width: 600px;
            padding: 15px 20px;
            font-size: 18px;
            border: 2px solid #bdc3c7;
            border-radius: 30px;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        input[type="text"]:focus {
            border-color: #3498db;
            box-shadow: 0 0 8px rgba(52, 152, 219, 0.3);
        }
        .results {
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        .result-item {
            display: flex;
            flex-direction: column;
            padding: 15px 20px;
            border-bottom: 1px solid #ecf0f1;
            transition: background-color 0.2s;
        }
        .result-item-top {
            display: flex;
            align-items: center;
            width: 100%;
        }
        .result-item:last-child {
            border-bottom: none;
        }
        .result-item:hover {
            background-color: #f9f9f9;
        }
        .account-number {
            font-weight: bold;
            color: #2980b9;
            width: 75px;
            flex-shrink: 0;
            font-size: 1.1em;
        }
        .account-name {
            flex-grow: 1;
            padding-right: 15px;
            font-weight: 500;
        }
        .account-badge {
            font-size: 0.75em;
            font-weight: bold;
            padding: 6px 12px;
            border-radius: 20px;
            white-space: nowrap;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .account-keywords {
            font-size: 0.85em;
            color: #7f8c8d;
            margin-top: 8px;
            margin-left: 75px;
            font-style: italic;
        }
        
        .badge-akt { background-color: #e3f2fd; color: #0d47a1; }
        .badge-pas { background-color: #fce4ec; color: #880e4f; }
        .badge-ap { background-color: #f3e5f5; color: #4a148c; }
        .badge-koszt { background-color: #fff8e1; color: #ff8f00; }
        .badge-przych { background-color: #e8f5e9; color: #1b5e20; }
        .badge-poza { background-color: #eeeeee; color: #616161; }

        .no-results {
            padding: 30px;
            text-align: center;
            color: #7f8c8d;
            font-style: italic;
        }
        
        .legend {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .legend span {
            font-size: 0.8em;
            padding: 4px 10px;
            border-radius: 15px;
        }
    </style>
</head>

        };

        const searchInput = document.getElementById('searchInput');
        const resultsContainer = document.getElementById('resultsContainer');

        function renderujWyniki(wyniki) {
            resultsContainer.innerHTML = ''; 

            if (wyniki.length === 0) {
                resultsContainer.innerHTML = '<div class="no-results">Brak wyników. Spróbuj zmienić słowo.</div>';
                return;
            }

            // Sortowanie numeryczne kont, by zachowały porządek rosnący
            wyniki.sort((a, b) => a[0].localeCompare(b[0]));

            wyniki.forEach(([numer, dane]) => {
                const resultDiv = document.createElement('div');
                resultDiv.className = 'result-item';
                
                const topDiv = document.createElement('div');
                topDiv.className = 'result-item-top';

                const numberSpan = document.createElement('div');
                numberSpan.className = 'account-number';
                numberSpan.textContent = numer;

                const nameSpan = document.createElement('div');
                nameSpan.className = 'account-name';
                nameSpan.textContent = dane.nazwa;

                const badgeSpan = document.createElement('div');
                badgeSpan.className = `account-badge badge-${dane.klasa}`;
                badgeSpan.textContent = dane.typ;

                topDiv.appendChild(numberSpan);
                topDiv.appendChild(nameSpan);
                topDiv.appendChild(badgeSpan);
                resultDiv.appendChild(topDiv);

                if (dane.opis && dane.opis.trim() !== "") {
                    const keywordsSpan = document.createElement('div');
                    keywordsSpan.className = 'account-keywords';
                    keywordsSpan.textContent = `Szuka też po: ${dane.opis}`;
                    resultDiv.appendChild(keywordsSpan);
                }

                resultsContainer.appendChild(resultDiv);
            });
        }

        function pokazWszystkie() {
            renderujWyniki(Object.entries(konta));
        }

        searchInput.addEventListener('input', function() {
            const query = this.value.trim().toLowerCase();
            
            if (query === '') {
                pokazWszystkie();
                return;
            }

            const filtrowane = Object.entries(konta).filter(([numer, dane]) => {
                const wNumerze = numer.toLowerCase().includes(query);
                const wNazwie = dane.nazwa.toLowerCase().includes(query);
                const wOpisie = dane.opis ? dane.opis.toLowerCase().includes(query) : false;
                
                return wNumerze || wNazwie || wOpisie;
            });

            renderujWyniki(filtrowane);
        });

        // Wczytanie na start
        pokazWszystkie();
    </script>
